name: CI Workflow

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'production-release' || format('ci-{0}', github.run_id) }}
  cancel-in-progress: false

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend_changed: ${{ steps.filter.outputs.frontend }}
      backend_changed: ${{ steps.filter.outputs.backend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run paths-filter
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'

  frontend-test:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend_changed == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: frontend/package.json

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          check-latest: true
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Format
        run: pnpm run format

      - name: Run ESLint
        run: pnpm run lint

      - name: Run tests
        run: pnpm test

      - name: Run coverage
        run: pnpm run coverage

      - name: Build for production
        run: pnpm run build

      - name: Upload frontend deployment artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v6
        with:
          name: frontend-dist
          path: frontend/dist/
          if-no-files-found: error
          retention-days: 90

      - name: Upload frontend test results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: frontend-test-results
          path: |
            frontend/test-results/**
            frontend/coverage/**
          retention-days: 7

  backend-test:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend_changed == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle dependencies
        uses: actions/cache@v5
        with:
          path: ~/.gradle/caches
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x ./gradlew

      - name: Run backend checks
        run: ./gradlew check

      - name: Upload backend check results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: backend-check-results
          path: |
            backend/build/reports/**
            backend/build/test-results/**
          retention-days: 7

  deploy-gate:
    needs:
      - detect-changes
      - frontend-test
      - backend-test
    if: >-
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.detect-changes.result == 'success' &&
      (needs.detect-changes.outputs.frontend_changed != 'true' || needs.frontend-test.result == 'success') &&
      (needs.detect-changes.outputs.backend_changed != 'true' || needs.backend-test.result == 'success') &&
      (needs.detect-changes.outputs.frontend_changed == 'true' || needs.detect-changes.outputs.backend_changed == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Confirm deployment prerequisites
        run: echo "All checks required for this release have succeeded."

  backend-deploy:
    needs:
      - detect-changes
      - deploy-gate
    if: >-
      always() &&
      needs.deploy-gate.result == 'success' &&
      needs.detect-changes.outputs.backend_changed == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/backend-deploy.yaml
    secrets: inherit

  frontend-deploy:
    needs:
      - detect-changes
      - deploy-gate
      - backend-deploy
    if: >-
      always() &&
      needs.deploy-gate.result == 'success' &&
      needs.detect-changes.outputs.frontend_changed == 'true' &&
      (needs.detect-changes.outputs.backend_changed != 'true' || needs.backend-deploy.result == 'success')
    permissions:
      id-token: write
      actions: read
      contents: read
    uses: ./.github/workflows/frontend-deploy.yaml
    secrets: inherit
