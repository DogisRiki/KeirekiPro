<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title th:text="${export.title}"></title>
    <style>
        @page {
            size: A4;
            margin: 9mm 11mm 9mm 11mm;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Noto Sans JP", sans-serif;
            color: #000;
            font-size: 10.4px;
            line-height: 1.4;
            word-break: break-all;
            overflow-wrap: break-word;
        }

        .header {
            margin-bottom: 8px;
            position: relative;
        }

        .document-title {
            text-align: center;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.55em;
            margin: 0 0 7px;
            line-height: 1.2;
        }

        .header-meta {
            text-align: right;
            font-size: 10.2px;
            line-height: 1.35;
            margin-top: 0;
        }

        .header-name-label {
            display: inline-block;
            border-bottom: 1px solid #000;
            padding: 0 2px 1px;
        }

        .section {
            margin-top: 8px;
        }

        .section:last-child {
            margin-bottom: 0;
        }

        .section-title {
            font-size: 11.4px;
            font-weight: 700;
            margin: 0 0 3px;
            line-height: 1.25;
        }

        .section-title::before {
            content: "■";
        }

        .career-list {
            width: 100%;
            border-collapse: collapse;
            margin: 0 0 6px;
            table-layout: fixed;
        }

        .career-list td {
            border: none;
            padding: 0 8px 1px 0;
            font-size: 10.4px;
            line-height: 1.35;
            vertical-align: top;
        }

        .career-list .career-period {
            width: 185px;
            white-space: nowrap;
        }

        .company-section {
            page-break-inside: auto;
        }

        .company-page-break {
            page-break-before: always;
        }

        .company-title {
            font-weight: 700;
            font-size: 11px;
            line-height: 1.35;
            margin: 0 0 2px;
        }

        .work-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            margin: 0 0 6px;
            page-break-inside: auto;
        }

        .work-table th,
        .work-table td {
            border: 1px solid #000;
            padding: 2.5px 4.5px;
            vertical-align: top;
        }

        .work-table thead {
            display: table-header-group;
        }

        .work-table th {
            background: #d9d9d9;
            text-align: center;
            font-weight: 400;
            line-height: 1.2;
        }

        .period-col {
            width: 12.5%;
        }

        .content-col {
            width: 56.5%;
        }

        .tech-col {
            width: 31%;
        }

        .period-cell {
            text-align: center;
            line-height: 1.7;
            white-space: normal;
        }

        .period-cell .period-part {
            display: block;
        }

        .content-cell {
            line-height: 1.4;
        }

        .tech-cell {
            line-height: 1.34;
            font-size: 9.8px;
        }

        .project-block {
            margin: 0;
        }

        .project-heading {
            font-weight: 700;
            margin: 0 0 5px;
            line-height: 1.3;
        }

        .project-name {
            font-weight: 700;
            margin: 0 0 7px;
            line-height: 1.3;
        }

        .field-block {
            margin: 0 0 7px;
        }

        .field-label {
            display: block;
            margin: 0;
        }

        .field-text {
            margin: 0;
            white-space: pre-line;
        }

        .achievement-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .achievement-list li {
            margin: 0 0 1px;
            padding: 0;
            text-indent: 0;
        }

        .tech-section {
            margin: 0 0 7px;
        }

        .tech-section-title {
            font-weight: 700;
            margin: 0 0 1px;
            line-height: 1.3;
        }

        .tech-line {
            margin: 0;
            line-height: 1.34;
        }

        .sub-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            margin-top: 2px;
        }

        .sub-table th,
        .sub-table td {
            border: 1px solid #000;
            padding: 3px 5px;
            vertical-align: top;
            font-size: 10.4px;
            line-height: 1.35;
        }

        .sub-table th {
            background: #d9d9d9;
            text-align: center;
            font-weight: 400;
        }

        .cert-date-col {
            width: 22%;
        }

        .portfolio-title,
        .pr-title {
            font-weight: 700;
            margin: 0 0 3px;
        }

        .portfolio-box {
            border: 1px solid #000;
            padding: 4px 5px;
            margin-bottom: 6px;
            page-break-inside: avoid;
        }

        .pr-section {
            border: 1px solid #000;
            padding: 4px 5px;
            margin-bottom: 6px;
            page-break-inside: auto;
        }

        .portfolio-box p,
        .pr-section p {
            margin: 0 0 3px;
            white-space: pre-line;
            line-height: 1.4;
        }

        .sns-list {
            margin: 0;
            padding: 0;
        }

        .sns-item {
            margin: 0 0 1px;
            line-height: 1.35;
        }

        .sns-bullet {
            display: inline;
            font-size: 10.4px;
            line-height: 1;
        }

        body>*:last-child,
        .section:last-child,
        .pr-section:last-child,
        .pr-section:last-child p:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1 class="document-title" th:text="${export.title}"></h1>
        <div class="header-meta">
            <div th:text="${export.asOfDateLabel}"></div>
            <div class="header-name-label">
                氏名：<span th:text="${export.fullName}"></span>
            </div>
        </div>
    </div>

    <div class="section" th:if="${export.careers != null and !export.careers.isEmpty()}">
        <div class="section-title">職歴</div>
        <table class="career-list">
            <tbody>
                <tr th:each="career : ${export.careers}">
                    <td class="career-period" th:text="${career.periodLabel}"></td>
                    <td th:text="${career.companyName}"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="section" th:if="${export.companySections != null and !export.companySections.isEmpty()}">
        <div class="section-title">職務内容</div>

        <div class="company-section" th:each="company, stat : ${export.companySections}"
            th:classappend="${!stat.first} ? ' company-page-break' : ''">
            <div class="company-title">
                勤務先：<span th:text="${company.companyLabel}"></span>
                <span th:if="${company.companyPeriodLabel != null and !#strings.isEmpty(company.companyPeriodLabel)}">
                    （勤務期間：<span th:text="${company.companyPeriodLabel}"></span>）
                </span>
            </div>

            <table class="work-table">
                <thead>
                    <tr>
                        <th class="period-col">期間</th>
                        <th class="content-col">業務内容</th>
                        <th class="tech-col">技術スタック</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="project : ${company.projects}">
                        <td class="period-cell">
                            <span class="period-part" th:text="${project.periodStartLabel}"></span>
                            <span class="period-part">～</span>
                            <span class="period-part" th:text="${project.periodEndLabel}"></span>
                        </td>
                        <td class="content-cell">
                            <div class="project-block">
                                <div class="project-heading">【プロジェクト内容】</div>
                                <div class="project-name" th:text="${project.projectName}"></div>

                                <div class="field-block"
                                    th:if="${project.overview != null and !#strings.isEmpty(project.overview)}">
                                    <span class="field-label">プロジェクト概要：</span>
                                    <p class="field-text" th:text="${project.overview}"></p>
                                </div>

                                <div class="field-block"
                                    th:if="${project.teamComp != null and !#strings.isEmpty(project.teamComp)}">
                                    <span class="field-label">チーム構成：</span>
                                    <p class="field-text" th:text="${project.teamComp}"></p>
                                </div>

                                <div class="field-block"
                                    th:if="${project.role != null and !#strings.isEmpty(project.role)}">
                                    <span class="field-label">役割：</span>
                                    <p class="field-text" th:text="${project.role}"></p>
                                </div>

                                <div class="field-block"
                                    th:if="${project.achievements != null and !project.achievements.isEmpty()}">
                                    <span class="field-label">主な成果：</span>
                                    <ul class="achievement-list">
                                        <li th:each="achievement : ${project.achievements}" th:text="${achievement}">
                                        </li>
                                    </ul>
                                </div>

                                <div class="field-block"
                                    th:if="${project.process != null and project.process.label != null and !#strings.isEmpty(project.process.label)}">
                                    <span class="field-label">【作業工程】</span>
                                    <p class="field-text" th:text="${project.process.label}"></p>
                                </div>
                            </div>
                        </td>
                        <td class="tech-cell">
                            <div th:if="${project.techSections != null and !project.techSections.isEmpty()}">
                                <div class="tech-section" th:each="section : ${project.techSections}">
                                    <div class="tech-section-title">【<span th:text="${section.title}"></span>】
                                    </div>
                                    <p class="tech-line" th:each="line : ${section.lines}">
                                        <span th:text="${line.label}"></span>：<span th:text="${line.value}"></span>
                                    </p>
                                </div>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="section" th:if="${export.certifications != null and !export.certifications.isEmpty()}">
        <div class="section-title">保有資格</div>
        <table class="sub-table">
            <thead>
                <tr>
                    <th class="cert-date-col">取得年月</th>
                    <th>資格名</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="c : ${export.certifications}">
                    <td th:text="${c.acquiredAtLabel}"></td>
                    <td th:text="${c.name}"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="section" th:if="${export.portfolios != null and !export.portfolios.isEmpty()}">
        <div class="section-title">個人開発・成果物</div>

        <div class="portfolio-box" th:each="p : ${export.portfolios}">
            <div class="portfolio-title" th:text="${p.name}"></div>
            <p th:if="${p.overview != null and !#strings.isEmpty(p.overview)}" th:text="${p.overview}"></p>
            <p th:if="${p.url != null and !#strings.isEmpty(p.url)}">
                URL：<span th:text="${p.url}"></span>
            </p>
            <p th:if="${p.techStack != null and !#strings.isEmpty(p.techStack)}">
                技術スタック：<span th:text="${p.techStack}"></span>
            </p>
        </div>
    </div>

    <div class="section" th:if="${export.snsPlatforms != null and !export.snsPlatforms.isEmpty()}">
        <div class="section-title">SNS</div>
        <div class="sns-list">
            <div class="sns-item" th:each="s : ${export.snsPlatforms}">
                <span class="sns-bullet">・</span><span th:text="${s.name}"></span>：<span th:text="${s.url}"></span>
            </div>
        </div>
    </div>

    <div class="section" th:if="${export.selfPromotions != null and !export.selfPromotions.isEmpty()}">
        <div class="section-title">自己PR</div>
        <div class="pr-section" th:each="sp : ${export.selfPromotions}">
            <div class="pr-title" th:text="${sp.title}"></div>
            <p th:text="${sp.content}"></p>
        </div>
    </div>
</body>

</html>
